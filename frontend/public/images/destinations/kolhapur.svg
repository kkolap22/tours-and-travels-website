<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a1080;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- Moon glow -->
  <circle cx="650" cy="90" r="60" fill="#f39c12" opacity="0.2"/>
  <circle cx="650" cy="90" r="40" fill="#f39c12" opacity="0.3"/>
  <circle cx="650" cy="90" r="25" fill="#ffeaa7" opacity="0.8"/>
  <!-- Palace base -->
  <rect x="150" y="280" width="500" height="150" fill="#5d4037"/>
  <rect x="180" y="260" width="440" height="30" fill="url(#gold)" rx="4"/>
  <!-- Palace towers -->
  <rect x="160" y="180" width="80" height="120" fill="#6d4c41"/>
  <polygon points="160,180 200,130 240,180" fill="url(#gold)"/>
  <rect x="560" y="180" width="80" height="120" fill="#6d4c41"/>
  <polygon points="560,180 600,130 640,180" fill="url(#gold)"/>
  <!-- Center dome -->
  <rect x="340" y="200" width="120" height="90" fill="#795548"/>
  <ellipse cx="400" cy="200" rx="80" ry="55" fill="url(#gold)"/>
  <!-- Windows -->
  <rect x="185" y="310" width="30" height="40" fill="#f39c12" rx="15" opacity="0.8"/>
  <rect x="235" y="310" width="30" height="40" fill="#f39c12" rx="15" opacity="0.8"/>
  <rect x="535" y="310" width="30" height="40" fill="#f39c12" rx="15" opacity="0.8"/>
  <rect x="585" y="310" width="30" height="40" fill="#f39c12" rx="15" opacity="0.8"/>
  <!-- Ground -->
  <rect x="0" y="430" width="800" height="70" fill="#2d5a1b" opacity="0.8"/>
  <!-- Stars -->
  <circle cx="50" cy="60" r="2" fill="white" opacity="0.7"/>
  <circle cx="150" cy="40" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="300" cy="70" r="2" fill="white" opacity="0.8"/>
  <circle cx="500" cy="50" r="1.5" fill="white" opacity="0.7"/>
  <text x="400" y="490" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#ffeaa7" opacity="0.9" font-weight="bold">Kolhapur Royal Heritage</text>
</svg>
